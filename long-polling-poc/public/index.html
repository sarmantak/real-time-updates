<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Long-Polling PoC</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input[type='text'] {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type='text']:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status-box {
      background: #f5f5f5;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    .status-label {
      font-size: 12px;
      text-transform: uppercase;
      color: #999;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .status-value {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      word-break: break-all;
    }

    .poll-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #999;
      animation: pulse 2s infinite;
    }

    .status-indicator.listening {
      background: #4caf50;
    }

    .status-indicator.idle {
      background: #ff9800;
      animation: none;
    }

    .status-indicator.error {
      background: #f44336;
      animation: none;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .log-container {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      max-height: 300px;
      overflow-y: auto;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }

    .log-entry {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      color: #666;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-entry.success {
      color: #4caf50;
      font-weight: 600;
    }

    .log-entry.error {
      color: #f44336;
      font-weight: 600;
    }

    .log-entry.info {
      color: #2196f3;
    }

    .timestamp {
      color: #999;
      margin-right: 8px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    .stat-card {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 Long-Polling PoC</h1>
    <p class="subtitle">Real-time communication via long-polling</p>

    <!-- Trigger Message Section -->
    <div class="section">
      <div class="section-title">📨 Send Message</div>
      <div class="input-group">
        <input
          type="text"
          id="messageInput"
          placeholder="Type a message and send..."
          value="Hello from server!"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
      <div class="status-box">
        <div class="status-label">Last Trigger</div>
        <div class="status-value" id="lastTrigger">None</div>
      </div>
    </div>

    <!-- Polling Status Section -->
    <div class="section">
      <div class="section-title">🎯 Polling Status</div>
      <div class="poll-status">
        <div class="status-indicator listening" id="statusIndicator"></div>
        <span id="statusText">Listening for messages...</span>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="pollCount">0</div>
          <div class="stat-label">Polls Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="messageCount">0</div>
          <div class="stat-label">Messages Received</div>
        </div>
      </div>
    </div>

    <!-- Recent Message Section -->
    <div class="section">
      <div class="section-title">💬 Latest Message</div>
      <div class="status-box">
        <div class="status-label">Received</div>
        <div class="status-value" id="latestMessage">Waiting for data...</div>
      </div>
    </div>

    <!-- Event Log Section -->
    <div class="section">
      <div class="section-title">📋 Event Log</div>
      <div class="log-container" id="logContainer"></div>
    </div>
  </div>

  <script type="module" src="client.js"></script>
</body>
</html>
