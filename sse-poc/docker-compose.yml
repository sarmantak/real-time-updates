version: '3.8'

services:
  sse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sse-poc
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - sse-network

networks:
  sse-network:
    driver: bridge
